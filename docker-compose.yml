version: '3.8'

services:
  influxdb:
    image: influxdb:1.8.10
    container_name: relic-influxdb
    restart: unless-stopped
    environment:
      - INFLUXDB_DB=relic_monitor
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin_relic_2026
      - INFLUXDB_WRITE_USER=writer
      - INFLUXDB_WRITE_USER_PASSWORD=writer_relic_2026
      - INFLUXDB_READ_USER=reader
      - INFLUXDB_READ_USER_PASSWORD=reader_relic_2026
      - INFLUXDB_HTTP_AUTH_ENABLED=true
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql:ro
    ports:
      - "8086:8086"
    networks:
      - relic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relic-backend
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - RUST_LOG=info,relic_monitor_backend=debug,tower_http=debug
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - FRONTEND_DIR=/app/frontend
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_DB=relic_monitor
      - INFLUXDB_USER=writer
      - INFLUXDB_PASS=writer_relic_2026
      - ALERT_PH_LOW=5.5
      - ALERT_CA_HIGH=200
      - ALERT_COOLDOWN=1800
    volumes:
      - ./frontend:/app/frontend:ro
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - relic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  simulator:
    build:
      context: ./lora-simulator
      dockerfile: Dockerfile
    container_name: relic-simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - RUST_LOG=info,lora_simulator=info
      - SERVER_URL=http://backend:8080
      - SAMPLE_INTERVAL_SECS=1800
      - DEVICE_COUNT=80
      - BATCH_MODE=true
      - BATCH_SIZE=20
      - ACID_SHOCK_ENABLED=false
      - ACID_SHOCK_PH=3.5
      - ACID_SHOCK_DURATION_MIN=60
    ports:
      - "9091:9091"
    networks:
      - relic-network

  chronograf:
    image: chronograf:1.10
    container_name: relic-chronograf
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=admin_relic_2026
    volumes:
      - chronograf-data:/var/lib/chronograf
    ports:
      - "8888:8888"
    networks:
      - relic-network

volumes:
  influxdb-data:
  chronograf-data:

networks:
  relic-network:
    driver: bridge
